    <main class="zone">
      <div class="explore">
        <div class="zone-head">
          <h1>Explore</h1>
          <span class="sub">14 forks · 3 clusters · synced 6 min ago</span>
          <div class="tools">
            <div class="seg">
              <button class="on" data-view="map">Map</button>
              <button data-view="list">List</button>
            </div>
          </div>
        </div>

        <div class="sky-wrap">
          <svg class="starfield" aria-hidden="true"></svg>
          <div class="sky-glow"></div>
          <svg class="constellation" role="img" aria-label="Fork constellation. Use Tab to move between forks, Enter to inspect."></svg>
          <div class="legend">
            <span class="item"><span class="dot" style="background:var(--sig-feature)"></span>feature</span>
            <span class="item"><span class="dot" style="background:var(--sig-fix)"></span>fix</span>
            <span class="item"><span class="dot" style="background:var(--sig-refactor)"></span>refactor</span>
            <span class="item"><span class="dot" style="background:var(--sig-adaptation)"></span>adaptation</span>
            <span class="item"><span class="dot" style="background:var(--sig-dependency)"></span>dependency</span>
            <span class="item"><span class="dot" style="background:var(--accent)"></span>live</span>
          </div>
          <div class="hint">larger = higher significance · linked = cluster</div>
        </div>

        <div class="listview" hidden></div>
      </div>

      <aside class="inspector" aria-label="Fork inspector">
        <div class="insp-head"></div>
        <div class="insp-body"></div>
      </aside>
    </main>
